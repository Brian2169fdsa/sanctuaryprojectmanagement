<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sanctuary Recovery Centers — Project Hub</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --brand:       #29ABE2;
  --brand-dark:  #1a8ec2;
  --brand-light: #e8f7fd;
  --accent:      #E8521A;
  --accent-gold: #F7941D;
  --bg:          #f4f7fa;
  --surface:     #ffffff;
  --surface-2:   #f8fafc;
  --border:      #e2eaef;
  --border-2:    #c8d8e4;
  --text:        #0d1f2d;
  --text-2:      #4a6070;
  --text-3:      #8fa5b5;
  --danger:      #dc2626;
  --warn:        #d97706;
  --success:     #16a34a;
  --purple:      #7c3aed;
  --r:           10px;
  --r-lg:        16px;
  --shadow:      0 1px 3px rgba(0,0,0,.05), 0 4px 14px rgba(0,0,0,.07);
  --shadow-lg:   0 8px 32px rgba(0,0,0,.13), 0 2px 8px rgba(0,0,0,.06);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}

/* ─── VIEWS ─────────────────────────────── */
.view{display:none}
.view.active{display:block}

/* loading view removed */

/* ─── LOGIN ─────────────────────────────── */
#view-login{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#fff;position:relative;overflow:hidden}
#view-login.active{display:flex}

/* subtle background phoenix watermark */
#view-login::before{
  content:'';position:absolute;right:-60px;bottom:-60px;
  width:480px;height:480px;
  background:radial-gradient(ellipse at center, rgba(41,171,226,.06) 0%, transparent 70%);
  border-radius:50%;pointer-events:none;
}

.login-wrap{
  width:100%;max-width:420px;
  padding:20px;
  position:relative;z-index:1;
}

.login-card-outer{
  background:linear-gradient(135deg, var(--accent) 0%, var(--accent-gold) 35%, var(--brand) 100%);
  border-radius:22px;
  padding:3px;
  box-shadow:0 8px 48px rgba(41,171,226,.18), 0 2px 8px rgba(232,82,26,.12);
}

.login-card{
  background:#fff;
  border-radius:20px;
  padding:40px 38px 34px;
}

.login-card::before{ display:none; }

.login-logo{text-align:center;margin-bottom:28px}
.login-logo img{height:90px;object-fit:contain}

.login-tagline{
  text-align:center;
  font-size:12px;
  font-weight:600;
  text-transform:uppercase;
  letter-spacing:1.2px;
  color:var(--text-3);
  margin-bottom:28px;
  padding-bottom:24px;
  border-bottom:1px solid var(--border);
}

.login-tagline span{color:var(--brand)}

.f-label{display:block;font-size:11px;font-weight:700;color:var(--text-2);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
.login-input{width:100%;font-family:inherit;font-size:14px;padding:11px 14px;border:1.5px solid var(--border);border-radius:9px;color:var(--text);background:var(--surface-2);outline:none;transition:border-color .15s,background .15s}
.login-input:focus{border-color:var(--brand);background:#fff}
.login-group{margin-bottom:16px}

.btn-login{
  margin-top:8px;width:100%;font-family:inherit;font-size:14px;font-weight:700;
  padding:13px;letter-spacing:.3px;
  background:linear-gradient(135deg, var(--brand) 0%, var(--brand-dark) 100%);
  color:#fff;border:none;border-radius:9px;cursor:pointer;
  transition:opacity .15s,transform .1s;
}
.btn-login:hover{opacity:.92}
.btn-login:active{transform:scale(.98)}

.login-err{font-size:13px;color:var(--danger);background:#fee2e2;border-radius:8px;padding:9px 12px;display:none;margin-top:10px}
.login-err.show{display:block}

.login-footer{text-align:center;margin-top:20px;font-size:11px;color:var(--text-3)}

/* ─── APP SHELL ─────────────────────────── */
#view-app{min-height:100vh}

.app-header{
  background:#fff;
  border-bottom:1px solid var(--border);
  height:62px;padding:0 24px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:200;
  box-shadow:0 1px 0 var(--border), 0 2px 8px rgba(0,0,0,.04);
}

.header-left{display:flex;align-items:center;gap:14px}
.header-logo{height:36px;object-fit:contain}

.header-divider{width:1px;height:28px;background:var(--border)}

.hub-label{
  font-size:12px;font-weight:700;text-transform:uppercase;
  letter-spacing:.8px;color:var(--brand);
}

.header-right{display:flex;align-items:center;gap:10px}

.user-pill{
  display:flex;align-items:center;gap:8px;
  padding:5px 12px 5px 5px;
  border:1px solid var(--border);border-radius:30px;
  background:var(--surface-2);font-size:13px;font-weight:500;color:var(--text-2);
}

.user-avatar{
  width:28px;height:28px;border-radius:50%;
  background:linear-gradient(135deg, var(--brand) 0%, var(--brand-dark) 100%);
  color:#fff;font-size:11px;font-weight:700;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}

.user-role-badge{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:700;text-transform:uppercase;letter-spacing:.3px}
.user-role-badge.admin{background:#fff3e8;color:var(--accent)}
.user-role-badge.member{background:var(--brand-light);color:var(--brand-dark)}

.btn-signout{font-family:inherit;font-size:12px;font-weight:600;padding:6px 12px;background:transparent;border:1.5px solid var(--border);border-radius:8px;color:var(--text-2);cursor:pointer;transition:all .15s}
.btn-signout:hover{border-color:var(--danger);color:var(--danger)}

/* ─── MAIN ──────────────────────────────── */
.app-main{max-width:1120px;margin:0 auto;padding:32px 20px 80px}

/* ─── STATS ─────────────────────────────── */
.stats-row{display:flex;gap:10px;margin-bottom:26px;flex-wrap:wrap}

.stat-card{
  background:#fff;border:1px solid var(--border);
  border-radius:var(--r);padding:16px 20px;
  min-width:100px;flex:1;
  box-shadow:var(--shadow);
  position:relative;overflow:hidden;
}

.stat-card::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:2px;
  background:var(--border);
}

.stat-card.s-active::after{background:var(--warn)}
.stat-card.s-review::after{background:var(--brand)}
.stat-card.s-done::after{background:var(--success)}
.stat-card.s-blocked::after{background:var(--danger)}

.stat-num{font-size:28px;font-weight:700;line-height:1;margin-bottom:4px}
.stat-lbl{font-size:11px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:.5px}

/* ─── TOOLBAR ───────────────────────────── */
.toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;gap:12px;flex-wrap:wrap}
.toolbar-left{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.page-title{font-size:20px;font-weight:700;color:var(--text)}

.filter-tabs{display:flex;gap:3px;background:#fff;border:1px solid var(--border);border-radius:9px;padding:4px;box-shadow:var(--shadow)}
.ftab{font-family:inherit;font-size:11px;font-weight:700;padding:6px 13px;border-radius:6px;border:none;background:transparent;color:var(--text-2);cursor:pointer;transition:all .15s;text-transform:uppercase;letter-spacing:.4px}
.ftab:hover{color:var(--brand)}
.ftab.active{background:var(--brand);color:#fff}

.btn-new-project{
  display:flex;align-items:center;gap:7px;
  font-family:inherit;font-size:13px;font-weight:700;
  padding:10px 18px;
  background:linear-gradient(135deg, var(--accent) 0%, var(--accent-gold) 100%);
  color:#fff;border:none;border-radius:var(--r);cursor:pointer;
  transition:opacity .15s,transform .1s;white-space:nowrap;
  box-shadow:0 2px 8px rgba(232,82,26,.25);
}
.btn-new-project:hover{opacity:.9}
.btn-new-project:active{transform:scale(.98)}

/* ─── PROJECT GRID ──────────────────────── */
.project-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}

.project-card{
  background:#fff;border:1px solid var(--border);
  border-radius:var(--r-lg);padding:0;
  cursor:pointer;
  transition:border-color .15s,box-shadow .15s,transform .15s;
  box-shadow:var(--shadow);overflow:hidden;
}

.card-accent-bar{height:3px;background:var(--border);transition:background .15s}
.project-card:hover .card-accent-bar{background:linear-gradient(90deg, var(--accent), var(--brand))}
.project-card.status-in_progress .card-accent-bar{background:var(--warn)}
.project-card.status-in_review   .card-accent-bar{background:var(--brand)}
.project-card.status-completed   .card-accent-bar{background:var(--success)}
.project-card.status-blocked     .card-accent-bar{background:var(--danger)}

.project-card:hover{border-color:var(--brand);box-shadow:var(--shadow-lg);transform:translateY(-2px)}
.project-card.status-completed{opacity:.65}

.card-body-inner{padding:18px 20px 16px}

.card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px}

.card-badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;text-transform:uppercase;letter-spacing:.4px}
.badge-in_progress{background:#fef3c7;color:var(--warn)}
.badge-in_review{background:var(--brand-light);color:var(--brand-dark)}
.badge-completed{background:#dcfce7;color:var(--success)}
.badge-blocked{background:#fee2e2;color:var(--danger)}

.card-name{font-size:15px;font-weight:700;color:var(--text);margin-bottom:6px;line-height:1.3}

.card-deadline{font-size:11px;color:var(--text-3);font-family:'DM Mono',monospace;margin-bottom:16px}
.card-deadline.overdue{color:var(--danger);font-weight:600}

.card-footer{display:flex;align-items:center;justify-content:space-between;padding-top:12px;border-top:1px solid var(--border)}

.card-assignees{display:flex}
.assignee-bubble{
  width:26px;height:26px;border-radius:50%;
  background:var(--brand-light);color:var(--brand-dark);
  font-size:10px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  border:2px solid #fff;margin-right:-6px;
}

.card-counters{display:flex;align-items:center;gap:10px}
.card-counter{display:flex;align-items:center;gap:4px;font-size:12px;color:var(--text-3)}

.empty-grid{grid-column:1/-1;text-align:center;padding:70px 20px;color:var(--text-2)}
.empty-grid .eicon{font-size:46px;margin-bottom:14px}
.empty-grid h3{font-size:17px;font-weight:700;margin-bottom:6px}
.empty-grid p{font-size:13px;color:var(--text-3)}

/* ─── DETAIL MODAL ──────────────────────── */
#modal-detail{
  display:none;position:fixed;inset:0;
  background:rgba(13,31,45,.65);backdrop-filter:blur(4px);
  z-index:500;overflow-y:auto;padding:20px;
}
#modal-detail.open{display:flex;align-items:flex-start;justify-content:center}

.detail-sheet{
  background:#fff;border-radius:20px;
  width:100%;max-width:840px;margin:auto;
  box-shadow:var(--shadow-lg);
  animation:sheetIn .22s cubic-bezier(.16,1,.3,1);overflow:hidden;
}
@keyframes sheetIn{from{transform:scale(.96) translateY(16px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}

.detail-header{
  padding:24px 28px 0;
  border-bottom:1px solid var(--border);
  background:#fff;position:sticky;top:0;z-index:10;
}

.detail-header-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:14px}
.detail-name-wrap{flex:1}
.detail-name{font-size:21px;font-weight:700;color:var(--text);line-height:1.2;margin-bottom:8px}
.detail-meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap}

.detail-close{
  background:var(--bg);border:1px solid var(--border);border-radius:8px;
  width:34px;height:34px;display:flex;align-items:center;justify-content:center;
  font-size:16px;cursor:pointer;color:var(--text-2);transition:all .15s;flex-shrink:0;
}
.detail-close:hover{background:#fee2e2;color:var(--danger);border-color:#fca5a5}

.detail-actions{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:0;padding-bottom:16px}

.btn-status{
  font-family:inherit;font-size:11px;font-weight:700;padding:7px 13px;
  border-radius:8px;border:1.5px solid var(--border);background:transparent;
  color:var(--text-2);cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:5px;
  text-transform:uppercase;letter-spacing:.3px;
}
.btn-status:hover{border-color:var(--brand);color:var(--brand)}
.btn-status.active-status{border-color:var(--brand);color:var(--brand);background:var(--brand-light)}

.btn-notify{
  font-family:inherit;font-size:11px;font-weight:700;padding:7px 13px;
  border-radius:8px;border:1.5px solid var(--success);background:transparent;
  color:var(--success);cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:5px;
  text-transform:uppercase;letter-spacing:.3px;margin-left:auto;
}
.btn-notify:hover{background:var(--success);color:#fff}

/* detail tabs */
.detail-tabs{display:flex;gap:0;background:var(--surface-2);border-bottom:1px solid var(--border);padding:0 28px}
.dtab{font-family:inherit;font-size:13px;font-weight:600;padding:13px 18px;background:transparent;border:none;border-bottom:2px solid transparent;color:var(--text-3);cursor:pointer;transition:all .15s;margin-bottom:-1px}
.dtab:hover{color:var(--text-2)}
.dtab.active{color:var(--brand);border-bottom-color:var(--brand)}

.detail-body{padding:24px 28px}
.dpanel{display:none}
.dpanel.active{display:block}

/* ─── UPDATES ───────────────────────────── */
.updates-thread{display:flex;flex-direction:column;gap:12px;margin-bottom:20px;max-height:380px;overflow-y:auto;padding-right:4px}
.update-item{display:flex;gap:10px;align-items:flex-start}
.ui-avatar{width:32px;height:32px;border-radius:50%;background:var(--brand-light);color:var(--brand-dark);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.ui-bubble{flex:1;background:var(--surface-2);border:1px solid var(--border);border-radius:0 10px 10px 10px;padding:10px 14px}
.ui-author{font-size:11px;font-weight:700;color:var(--brand-dark);margin-bottom:3px}
.ui-content{font-size:13px;color:var(--text);line-height:1.55;white-space:pre-wrap}
.ui-time{font-size:10px;color:var(--text-3);margin-top:4px;font-family:'DM Mono',monospace}

.update-compose{display:flex;gap:8px;align-items:flex-end}
.compose-input{flex:1;font-family:inherit;font-size:13px;padding:10px 14px;border:1.5px solid var(--border);border-radius:10px;background:var(--surface-2);color:var(--text);resize:none;outline:none;min-height:42px;max-height:120px;transition:border-color .15s,background .15s}
.compose-input:focus{border-color:var(--brand);background:#fff}
.btn-post{font-family:inherit;font-size:13px;font-weight:700;padding:10px 18px;background:var(--brand);color:#fff;border:none;border-radius:10px;cursor:pointer;transition:background .15s;white-space:nowrap}
.btn-post:hover{background:var(--brand-dark)}
.no-updates{text-align:center;padding:28px 0;color:var(--text-3);font-size:13px;font-style:italic}

/* ─── DOCUMENTS ─────────────────────────── */
.doc-list{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.doc-item{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--surface-2);border:1px solid var(--border);border-radius:9px;transition:border-color .15s}
.doc-item:hover{border-color:var(--brand)}
.doc-icon{width:38px;height:38px;background:#e0f2fe;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.doc-info{flex:1;min-width:0}
.doc-name{font-size:13px;font-weight:600;color:var(--text)}
.doc-meta{font-size:11px;color:var(--text-3);margin-top:1px}
.doc-actions{display:flex;gap:6px}
.btn-doc-open{font-family:inherit;font-size:12px;font-weight:700;padding:6px 12px;background:var(--brand-light);color:var(--brand-dark);border:none;border-radius:6px;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:4px;transition:background .15s}
.btn-doc-open:hover{background:var(--brand);color:#fff}
.btn-doc-del{background:transparent;border:none;color:var(--text-3);cursor:pointer;font-size:14px;padding:4px 7px;border-radius:5px;transition:all .15s}
.btn-doc-del:hover{color:var(--danger);background:#fee2e2}

.doc-add-form{background:var(--surface-2);border:1.5px dashed var(--border-2);border-radius:10px;padding:16px}
.doc-add-form h4{font-size:11px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px}
.doc-add-row{display:flex;gap:8px;flex-wrap:wrap}
.doc-input{font-family:inherit;font-size:13px;padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;background:#fff;color:var(--text);outline:none;transition:border-color .15s}
.doc-input:focus{border-color:var(--brand)}
.doc-input.name-input{width:190px}
.doc-input.url-input{flex:1;min-width:200px}
.btn-add-doc{font-family:inherit;font-size:13px;font-weight:700;padding:9px 16px;background:var(--brand);color:#fff;border:none;border-radius:8px;cursor:pointer;white-space:nowrap;transition:background .15s}
.btn-add-doc:hover{background:var(--brand-dark)}

/* ─── PEOPLE ────────────────────────────── */
.section-label{font-size:11px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px}
.assignee-list{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.assignee-row{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--surface-2);border:1px solid var(--border);border-radius:9px}
.ar-avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--brand),var(--brand-dark));color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ar-info{flex:1}
.ar-name{font-size:13px;font-weight:600}
.ar-email{font-size:11px;color:var(--text-3)}
.btn-remove-assign{background:transparent;border:none;color:var(--text-3);cursor:pointer;font-size:14px;padding:4px 7px;border-radius:5px;transition:all .15s}
.btn-remove-assign:hover{color:var(--danger);background:#fee2e2}

.assign-add{display:flex;gap:8px}
.assign-select{flex:1;font-family:inherit;font-size:13px;padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);outline:none}
.assign-select:focus{border-color:var(--brand)}
.btn-assign{font-family:inherit;font-size:13px;font-weight:700;padding:9px 16px;background:var(--brand);color:#fff;border:none;border-radius:8px;cursor:pointer;transition:background .15s}
.btn-assign:hover{background:var(--brand-dark)}

/* ─── SMALL MODALS ──────────────────────── */
.sm-overlay{display:none;position:fixed;inset:0;background:rgba(13,31,45,.55);backdrop-filter:blur(3px);z-index:900;align-items:center;justify-content:center;padding:20px}
.sm-overlay.open{display:flex}
.sm-modal{background:#fff;border-radius:var(--r-lg);width:100%;max-width:460px;box-shadow:var(--shadow-lg);animation:sheetIn .2s ease;overflow:hidden}
.sm-modal::before{content:'';display:block;height:3px;background:linear-gradient(90deg,var(--accent) 0%,var(--accent-gold) 40%,var(--brand) 100%);border-radius:var(--r-lg) var(--r-lg) 0 0}
.sm-header{display:flex;align-items:center;justify-content:space-between;padding:18px 22px 14px;border-bottom:1px solid var(--border)}
.sm-title{font-size:16px;font-weight:700}
.sm-close{background:none;border:none;font-size:18px;cursor:pointer;color:var(--text-2);padding:2px 6px;border-radius:5px}
.sm-close:hover{background:var(--bg)}
.sm-body{padding:20px 22px}
.sm-footer{display:flex;justify-content:flex-end;gap:10px;padding:14px 22px 20px}

.fg{margin-bottom:16px}
.fl{display:block;font-size:11px;font-weight:700;color:var(--text-2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.fi,.fs,.ft{width:100%;font-family:inherit;font-size:14px;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;color:var(--text);background:var(--surface-2);outline:none;transition:border-color .15s}
.fi:focus,.fs:focus,.ft:focus{border-color:var(--brand);background:#fff}
.ft{resize:vertical;min-height:80px}

.btn-cancel{font-family:inherit;font-size:13px;font-weight:500;padding:9px 16px;border:1.5px solid var(--border);border-radius:8px;background:transparent;color:var(--text-2);cursor:pointer}
.btn-cancel:hover{border-color:var(--text-2)}
.btn-confirm{font-family:inherit;font-size:13px;font-weight:700;padding:9px 20px;border:none;border-radius:8px;background:var(--brand);color:#fff;cursor:pointer;transition:background .15s}
.btn-confirm:hover{background:var(--brand-dark)}
.btn-confirm.green{background:var(--success)}
.btn-confirm.green:hover{background:#15803d}

<!-- DETAIL MODAL -->
<div id="modal-detail">
  <div class="detail-sheet">
    <div class="detail-header">
      <div class="detail-header-top">
        <div class="detail-name-wrap">
          <div class="detail-name" id="d-name">—</div>
          <div class="detail-meta">
            <span class="card-badge" id="d-badge"></span>
            <span style="font-size:12px;color:var(--text-3);font-family:'DM Mono',monospace" id="d-deadline"></span>
          </div>
        </div>
        <button class="detail-close" onclick="closeDetail()">✕</button>
      </div>
      <div class="detail-actions" id="d-actions"></div>
    </div>
    <div class="detail-tabs">
      <button class="dtab active" onclick="switchDTab('updates',this)">💬 Updates</button>
      <button class="dtab"        onclick="switchDTab('docs',this)">📁 Documents</button>
      <button class="dtab"        onclick="switchDTab('people',this)" id="tab-people">👥 Assigned To</button>
    </div>
    <div class="detail-body">
      <!-- UPDATES -->
      <div class="dpanel active" id="dpanel-updates">
        <div class="updates-thread" id="updates-thread"></div>
        <div class="update-compose">
          <textarea class="compose-input" id="compose-input"
            placeholder="Leave an update, note, or question…" rows="1"
            onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();postUpdate()}"></textarea>
          <button class="btn-post" onclick="postUpdate()">Post</button>
        </div>
      </div>
      <!-- DOCS -->
      <div class="dpanel" id="dpanel-docs">
        <div class="doc-list" id="doc-list"></div>
        <div class="doc-add-form">
          <h4>Attach OneDrive Document</h4>
          <div class="doc-add-row">
            <input class="doc-input name-input" type="text"  id="doc-name-in" placeholder="Document name">
            <input class="doc-input url-input"  type="url"   id="doc-url-in"  placeholder="Paste OneDrive share link…">
            <button class="btn-add-doc" onclick="addDoc()">Attach</button>
          </div>
        </div>
      </div>
      <!-- PEOPLE -->
      <div class="dpanel" id="dpanel-people">
        <div style="margin-bottom:22px">
          <div class="section-label">Currently Assigned</div>
          <div class="assignee-list" id="assignee-list"></div>
        </div>
        <div id="assign-add-section">
          <div class="section-label">Add Person</div>
          <div class="assign-add">
            <select class="assign-select" id="assign-select">
              <option value="">— select a team member —</option>
            </select>
            <button class="btn-assign" onclick="assignUser()">Assign</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

  </div>
</div>

let SB, currentUser, currentRole, allProjects=[], allUsers=[], currentFilter="all", detailProjectId=null;

const STATUS_CYCLE  = ["in_progress","in_review","completed","blocked"];
const STATUS_LABELS = {in_progress:"In Progress",in_review:"In Review",completed:"Completed",blocked:"Blocked"};

// ── BOOT ───────────────────────────────
document.addEventListener("DOMContentLoaded", async () => {
  // Guard: catch unconfigured deployment
  if (!CONFIG.supabaseUrl || CONFIG.supabaseUrl.includes("REPLACE") ||
      !CONFIG.supabaseKey || CONFIG.supabaseKey.includes("REPLACE")) {
    showView("login");
    const err = document.getElementById("login-err");
    err.textContent = "⚠ Supabase credentials not configured yet. See setup instructions.";
    err.classList.add("show");
    return;
  }
  try {
    SB = window.supabase.createClient(CONFIG.supabaseUrl, CONFIG.supabaseKey);
  } catch(e) {
    console.error("Failed to create Supabase client:", e);
    showView("login");
    const err = document.getElementById("login-err");
    err.textContent = "Connection error: " + (e.message || "Check Supabase credentials.");
    err.classList.add("show");
    return;
  }
  // Always set up auth listener so sign-in works even if getSession fails
  SB.auth.onAuthStateChange(async (ev, sess) => {
    if (ev==="SIGNED_IN"  && sess) await bootApp(sess.user);
    if (ev==="SIGNED_OUT")         showView("login");
  });
  // Try to restore existing session, but don't block login if it fails
  try {
    const {data:{session}, error} = await SB.auth.getSession();
    if (!error && session) { await bootApp(session.user); } else { showView("login"); }
  } catch(e) {
    console.error("Session restore failed (non-blocking):", e);
    showView("login");
  }
});

async function bootApp(user) {
  currentUser = user;
  currentRole = CONFIG.adminEmails.map(e=>e.toLowerCase()).includes(user.email.toLowerCase()) ? "admin" : "member";

  const displayName = user.user_metadata?.full_name || user.email.split("@")[0];
  CONFIG.currentUserName = displayName;

  document.getElementById("user-avatar-hdr").textContent = displayName.slice(0,2).toUpperCase();
  document.getElementById("user-name-hdr").textContent   = displayName;
  const rb = document.getElementById("user-role-hdr");
  rb.textContent = currentRole; rb.className = `user-role-badge ${currentRole}`;

  if (currentRole==="admin") document.getElementById("btn-new-wrap").style.display = "flex";

  // Load data separately from auth — schema/query errors should not block login
  try {
    await loadAllUsers();
  } catch(e) {
    console.error("Failed to load users:", e);
    showToast("Failed to load user profiles","err");
  }
  try {
    await loadProjects();
  } catch(e) {
    console.error("Failed to load projects:", e);
    showToast("Failed to load projects","err");
  }
  try {
    subscribeRealtime();
  } catch(e) {
    console.error("Realtime subscription failed:", e);
  }
  showView("app");
}

// ── AUTH ───────────────────────────────
async function signIn() {
  const email = document.getElementById("l-email").value.trim();
  const pass  = document.getElementById("l-pass").value;
  const errEl = document.getElementById("login-err");
  errEl.classList.remove("show");
  if (!email || !pass) { errEl.textContent = "Please enter email and password."; errEl.classList.add("show"); return; }
  try {
    const {data, error} = await SB.auth.signInWithPassword({email, password:pass});
    if (error) {
      // Detect server-side 500 errors (Supabase down/paused/schema issue)
      const msg = error.message || "";
      const status = error.status || error.statusCode || 0;
      if (status >= 500 || msg.includes("500") || msg.toLowerCase().includes("database error") || msg.toLowerCase().includes("internal server")) {
        errEl.textContent = "The database server returned an error (500). This usually means the Supabase project is paused or the database is down. Please check your Supabase dashboard and resume the project if needed.";
      } else {
        errEl.textContent = msg;
      }
      errEl.classList.add("show");
    }
  } catch(e) {
    console.error("Sign-in error:", e);
    const msg = (e && e.message) || "";
    if (msg.includes("Failed to fetch") || msg.includes("NetworkError") || msg.includes("fetch")) {
      errEl.textContent = "Network error — cannot reach the server. Check your internet connection or Supabase project status.";
    } else {
      errEl.textContent = "Unable to connect: " + (msg || "Unknown error. Please try again.");
    }
    errEl.classList.add("show");
  }
}
async function signOut() { await SB.auth.signOut(); showView("login"); }

// ── DATA ───────────────────────────────
async function loadAllUsers() {
  const displayName = currentUser.user_metadata?.full_name || currentUser.email.split("@")[0];
  try {
    const {data, error} = await SB.from("profiles").select("*").eq("org_id", CONFIG.org);
    if (error) {
      console.error("Error loading profiles:", error);
      allUsers = [];
    } else {
      allUsers = data || [];
    }
  } catch(e) {
    console.error("Profiles table query failed:", e);
    allUsers = [];
  }
  try {
    const {error: upsertErr} = await SB.from("profiles").upsert({
      id: currentUser.id, org_id: CONFIG.org,
      email: currentUser.email, name: displayName, role: currentRole
    }, {onConflict:"id"});
    if (upsertErr) console.error("Error upserting profile:", upsertErr);
  } catch(e) {
    console.error("Profile upsert failed:", e);
  }
  if (!allUsers.find(u=>u.id===currentUser.id)) {
    allUsers.push({id:currentUser.id, email:currentUser.email, name:displayName, role:currentRole});
  }
}

async function loadProjects() {
  let {data, error} = await SB.from("projects")
    .select("*, project_assignments(user_id), updates(id), documents(id)")
    .eq("org_id", CONFIG.org)
    .order("created_at",{ascending:false});

  // Fallback: if nested select fails (schema/FK error), try simple query
  if (error) {
    console.error("Nested select failed, trying simple query:", error);
    const res = await SB.from("projects")
      .select("*")
      .eq("org_id", CONFIG.org)
      .order("created_at",{ascending:false});
    data = res.data;
    error = res.error;
    if (data) {
      data = data.map(p => ({...p, project_assignments:[], updates:[], documents:[]}));
    }
  }

  if (error) { console.error("Failed to load projects:", error); showToast("Failed to load projects","err"); return; }
  let rows = data || [];
  if (currentRole==="member") {
    rows = rows.filter(p => Array.isArray(p.project_assignments) && p.project_assignments.some(a=>a.user_id===currentUser.id));
  }
  allProjects = rows;
  renderGrid();
  renderStats();
}

async function loadUpdates(pid) {
  try {
    const {data, error} = await SB.from("updates").select("*").eq("project_id",pid).order("created_at",{ascending:true});
    if (error) { console.error("Error loading updates:", error); return []; }
    return data||[];
  } catch(e) { console.error("loadUpdates failed:", e); return []; }
}
async function loadDocs(pid) {
  try {
    const {data, error} = await SB.from("documents").select("*").eq("project_id",pid).order("created_at",{ascending:true});
    if (error) { console.error("Error loading documents:", error); return []; }
    return data||[];
  } catch(e) { console.error("loadDocs failed:", e); return []; }
}
async function loadAssignees(pid) {
  try {
    let {data, error} = await SB.from("project_assignments").select("user_id, profiles(name,email)").eq("project_id",pid);
    // Fallback: if nested select fails (missing FK to profiles), try without it
    if (error) {
      console.error("Nested assignee select failed, trying simple query:", error);
      const res = await SB.from("project_assignments").select("user_id").eq("project_id",pid);
      data = res.data;
      error = res.error;
      if (data) {
        data = data.map(a => ({...a, profiles: allUsers.find(u=>u.id===a.user_id) || {name:"Unknown",email:""}}));
      }
    }
    if (error) { console.error("Error loading assignees:", error); return []; }
    return data||[];
  } catch(e) { console.error("loadAssignees failed:", e); return []; }
}

// ── RENDER GRID ────────────────────────
function renderGrid() {
  const grid = document.getElementById("project-grid");
  const list = currentFilter==="all" ? allProjects : allProjects.filter(p=>p.status===currentFilter);
  if (list.length===0) {
    grid.innerHTML=`<div class="empty-grid"><div class="eicon">📋</div>
      <h3>${currentFilter==="all"?"No projects yet":"No "+STATUS_LABELS[currentFilter]+" projects"}</h3>
      <p>${currentFilter==="all"&&currentRole==="admin"?'Click "+ New Project" to get started.':'Try another filter.'}</p></div>`;
    return;
  }
  grid.innerHTML = list.map(p => {
    const isOverdue = p.deadline && new Date(p.deadline)<new Date() && p.status!=="completed";
    const assigns   = p.project_assignments || [];
    return `
    <div class="project-card status-${p.status}${p.status==="completed"?" status-completed":""}" onclick="openDetail('${p.id}')">
      <div class="card-accent-bar"></div>
      <div class="card-body-inner">
        <div class="card-top">
          <span class="card-badge badge-${p.status}">${STATUS_LABELS[p.status]}</span>
        </div>
        <div class="card-name">${escHtml(p.name)}</div>
        <div class="card-deadline ${isOverdue?"overdue":""}">
          ${p.deadline?(isOverdue?"⚠ Overdue · ":"Due ")+fmtDate(p.deadline):"No deadline set"}
        </div>
        <div class="card-footer">
          <div class="card-assignees">
            ${assigns.slice(0,4).map(a=>{
              const u=allUsers.find(x=>x.id===a.user_id);
              return `<div class="assignee-bubble" title="${escHtml(u?.name||"?")}">${(u?.name||"?").slice(0,2).toUpperCase()}</div>`;
            }).join("")}
            ${assigns.length>4?`<div class="assignee-bubble">+${assigns.length-4}</div>`:""}
          </div>
          <div class="card-counters">
            <span class="card-counter">💬 ${p.updates?.length||0}</span>
            <span class="card-counter">📁 ${p.documents?.length||0}</span>
          </div>
        </div>
      </div>
    </div>`;
  }).join("");
}

function renderStats() {
  const c = {in_progress:0,in_review:0,completed:0,blocked:0};
  allProjects.forEach(p=>c[p.status]=(c[p.status]||0)+1);
  document.getElementById("stats-row").innerHTML=`
    <div class="stat-card"><div class="stat-num">${allProjects.length}</div><div class="stat-lbl">Total</div></div>
    <div class="stat-card s-active"><div class="stat-num" style="color:var(--warn)">${c.in_progress}</div><div class="stat-lbl">In Progress</div></div>
    <div class="stat-card s-review"><div class="stat-num" style="color:var(--brand)">${c.in_review}</div><div class="stat-lbl">In Review</div></div>
    <div class="stat-card s-done"><div class="stat-num" style="color:var(--success)">${c.completed}</div><div class="stat-lbl">Completed</div></div>
    <div class="stat-card s-blocked"><div class="stat-num" style="color:var(--danger)">${c.blocked}</div><div class="stat-lbl">Blocked</div></div>`;
}

// ── DETAIL ─────────────────────────────
async function openDetail(pid) {
  detailProjectId = pid;
  const p = allProjects.find(x=>x.id===pid); if (!p) return;

  document.getElementById("d-name").textContent = p.name;
  const badge = document.getElementById("d-badge");
  badge.textContent = STATUS_LABELS[p.status]; badge.className = `card-badge badge-${p.status}`;
  const dl = document.getElementById("d-deadline");
  const isOD = p.deadline && new Date(p.deadline)<new Date() && p.status!=="completed";
  dl.textContent = p.deadline?(isOD?"⚠ Overdue · ":"Due ")+fmtDate(p.deadline):"No deadline";
  dl.className = isOD?"overdue":"";

  buildStatusActions(pid, p.status);
  document.getElementById("tab-people").style.display = currentRole==="admin" ? "" : "none";
  switchDTab("updates", document.querySelector(".dtab"));

  const [updates, docs, assignees] = await Promise.all([loadUpdates(pid), loadDocs(pid), loadAssignees(pid)]);
  renderUpdates(updates); renderDocs(docs); renderAssignees(assignees, pid);

  document.getElementById("modal-detail").classList.add("open");
  setTimeout(()=>document.getElementById("compose-input").focus(), 100);
}

function closeDetail() {
  document.getElementById("modal-detail").classList.remove("open");
  detailProjectId = null;
  loadProjects();
}

document.getElementById("modal-detail").addEventListener("click", e=>{
  if (e.target===document.getElementById("modal-detail")) closeDetail();
});

function buildStatusActions(pid, currentStatus) {
  const actions = document.getElementById("d-actions");
  const btns = STATUS_CYCLE.map(s=>`
    <button class="btn-status${s===currentStatus?" active-status":""}"
      onclick="${s!==currentStatus?`cycleToStatus('${pid}','${s}')`:""}"
      style="${s===currentStatus?"cursor:default":""}">${STATUS_ICONS[s]} ${STATUS_LABELS[s]}</button>`).join("");
  actions.innerHTML = btns + `<button class="btn-notify" onclick="openNotify('${pid}')">📬 Notify Boss</button>`;
}

function switchDTab(name, btn) {
  document.querySelectorAll(".dpanel").forEach(el=>el.classList.remove("active"));
  document.querySelectorAll(".dtab").forEach(el=>el.classList.remove("active"));
  document.getElementById(`dpanel-${name}`).classList.add("active");
  if (btn) btn.classList.add("active");
}

// ── UPDATES ────────────────────────────
function renderUpdates(updates) {
  const t = document.getElementById("updates-thread");
  if (!updates.length) { t.innerHTML=`<div class="no-updates">No updates yet — post the first one below.</div>`; return; }
  t.innerHTML = updates.map(u=>`
    <div class="update-item">
      <div class="ui-avatar">${(u.author_name||"?").slice(0,2).toUpperCase()}</div>
      <div class="ui-bubble">
        <div class="ui-author">${escHtml(u.author_name)}</div>
        <div class="ui-content">${escHtml(u.content)}</div>
        <div class="ui-time">${fmtTime(u.created_at)}</div>
      </div>
    </div>`).join("");
  t.scrollTop = t.scrollHeight;
}

async function postUpdate() {
  const inp = document.getElementById("compose-input");
  const content = inp.value.trim();
  if (!content || !detailProjectId) return;
  const {error} = await SB.from("updates").insert({
    project_id: detailProjectId, author_id: currentUser.id,
    author_name: CONFIG.currentUserName, content
  });
  if (error) { showToast("Failed to post","err"); return; }
  inp.value = "";
  renderUpdates(await loadUpdates(detailProjectId));
  showToast("Update posted ✓","ok");
}

// ── DOCS ───────────────────────────────
function renderDocs(docs) {
  const el = document.getElementById("doc-list");
  if (!docs.length) { el.innerHTML=`<div class="no-updates">No documents attached yet.</div>`; return; }
  el.innerHTML = docs.map(d=>`
    <div class="doc-item">
      <div class="doc-icon">☁️</div>
      <div class="doc-info">
        <div class="doc-name">${escHtml(d.name)}</div>
        <div class="doc-meta">Added ${fmtDate(d.created_at)} · ${escHtml(d.added_by_name||"—")}</div>
      </div>
      <div class="doc-actions">
        <a class="btn-doc-open" href="${escHtml(d.url)}" target="_blank" rel="noopener">↗ Open</a>
        ${currentRole==="admin"?`<button class="btn-doc-del" onclick="deleteDoc('${d.id}',event)">✕</button>`:""}
      </div>
    </div>`).join("");
}

async function addDoc() {
  const n = document.getElementById("doc-name-in").value.trim();
  const u = document.getElementById("doc-url-in").value.trim();
  if (!n||!u) { showToast("Name and link are required","err"); return; }
  const {error} = await SB.from("documents").insert({
    project_id:detailProjectId, name:n, url:u,
    added_by:currentUser.id, added_by_name:CONFIG.currentUserName, org_id:CONFIG.org
  });
  if (error) { showToast("Failed to attach","err"); return; }
  document.getElementById("doc-name-in").value="";
  document.getElementById("doc-url-in").value="";
  renderDocs(await loadDocs(detailProjectId));
  showToast("Document attached ✓","ok");
}

async function deleteDoc(docId, e) {
  e.stopPropagation();
  if (!confirm("Remove this document?")) return;
  await SB.from("documents").delete().eq("id",docId);
  renderDocs(await loadDocs(detailProjectId));
  showToast("Removed");
}

// ── PEOPLE ─────────────────────────────
function renderAssignees(assignees, pid) {
  const list = document.getElementById("assignee-list");
  const sel  = document.getElementById("assign-select");
  list.innerHTML = !assignees.length
    ? `<div class="no-updates">No one assigned yet.</div>`
    : assignees.map(a=>{
        const nm = a.profiles?.name||"Unknown";
        return `<div class="assignee-row">
          <div class="ar-avatar">${nm.slice(0,2).toUpperCase()}</div>
          <div class="ar-info"><div class="ar-name">${escHtml(nm)}</div><div class="ar-email">${escHtml(a.profiles?.email||"")}</div></div>
          ${currentRole==="admin"?`<button class="btn-remove-assign" onclick="removeAssign('${a.user_id}','${pid}')">✕</button>`:""}
        </div>`;
      }).join("");

  const taken = assignees.map(a=>a.user_id);
  sel.innerHTML = `<option value="">— select a team member —</option>` +
    allUsers.filter(u=>!taken.includes(u.id))
      .map(u=>`<option value="${u.id}">${escHtml(u.name)} &lt;${escHtml(u.email)}&gt;</option>`).join("");

  document.getElementById("assign-add-section").style.display = currentRole==="admin"?"":"none";
}

async function assignUser() {
  const uid = document.getElementById("assign-select").value;
  if (!uid) { showToast("Select a team member","err"); return; }
  const {error} = await SB.from("project_assignments").insert({project_id:detailProjectId, user_id:uid});
  if (error) { showToast("Already assigned or error","err"); return; }
  renderAssignees(await loadAssignees(detailProjectId), detailProjectId);
  showToast("Assigned ✓","ok");
}

async function removeAssign(uid, pid) {
  await SB.from("project_assignments").delete().eq("project_id",pid).eq("user_id",uid);
  renderAssignees(await loadAssignees(pid), pid);
  showToast("Removed");
}

// ── PROJECTS CRUD ──────────────────────
async function createProject() {
  const name = document.getElementById("np-name").value.trim();
  const dl   = document.getElementById("np-deadline").value;
  const st   = document.getElementById("np-status").value;
  const note = document.getElementById("np-note").value.trim();
  if (!name) { showToast("Project name required","err"); return; }
  const {data,error} = await SB.from("projects")
    .insert({org_id:CONFIG.org, name, deadline:dl||null, status:st, created_by:currentUser.id})
    .select().single();
  if (error) { showToast("Error creating project","err"); return; }
  if (note) {
    await SB.from("updates").insert({
      project_id:data.id, author_id:currentUser.id, author_name:CONFIG.currentUserName, content:note
    });
  }
  closeSm("modal-new");
  ["np-name","np-deadline","np-note"].forEach(id=>document.getElementById(id).value="");
  showToast("Project created ✓","ok");
  await loadProjects();
}

async function cycleToStatus(pid, ns) {
  await SB.from("projects").update({status:ns}).eq("id",pid);
  const p = allProjects.find(x=>x.id===pid);
  if (p) {
    p.status = ns;
    const badge = document.getElementById("d-badge");
    badge.textContent = STATUS_LABELS[ns]; badge.className = `card-badge badge-${ns}`;
    buildStatusActions(pid, ns);
  }
  renderGrid(); renderStats();
  showToast(`Status → ${STATUS_LABELS[ns]}`,"ok");
}

// ── NOTIFY ─────────────────────────────
function openNotify(pid) {
  const p = allProjects.find(x=>x.id===pid); if (!p) return;
  detailProjectId = pid;
  document.getElementById("nb-project").textContent = p.name;
  document.getElementById("nb-to").innerHTML = `📧 Sending to <strong>${CONFIG.bossName}</strong> at ${CONFIG.bossEmail}`;
  document.getElementById("nb-note").value=""; document.getElementById("nb-status").value="";
  openSm("modal-notify");
}

async function sendNotify() {
  const note = document.getElementById("nb-note").value.trim();
  const ns   = document.getElementById("nb-status").value;
  const p    = allProjects.find(x=>x.id===detailProjectId);
  if (!note) { showToast("Add a note first","err"); return; }
  if (ns) { await SB.from("projects").update({status:ns}).eq("id",detailProjectId); if(p) p.status=ns; }
  await SB.from("feedback_logs").insert({
    project_id:detailProjectId, org_id:CONFIG.org,
    note, recipient_email:CONFIG.bossEmail, sent_by:currentUser.id
  });
  await SB.from("updates").insert({
    project_id:detailProjectId, author_id:currentUser.id, author_name:CONFIG.currentUserName,
    content:`📬 Notified ${CONFIG.bossName}: "${note}"`
  });
  try {
    await fetch(CONFIG.webhookUrl, {
      method:"POST", headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        org:CONFIG.orgName, project_name:p?.name,
        status:ns||p?.status, note,
        sender:CONFIG.currentUserName, sender_email:currentUser.email,
        recipient:CONFIG.bossEmail, sent_at:new Date().toISOString()
      })
    });
  } catch(e) { console.warn("Webhook:", e); }
  closeSm("modal-notify");
  renderUpdates(await loadUpdates(detailProjectId));
  renderGrid();
  showToast(`Notified ${CONFIG.bossName} ✓`,"ok");
}

// ── REALTIME ───────────────────────────
function subscribeRealtime() {
  try {
    SB.channel("src-hub")
      .on("postgres_changes",{event:"*",schema:"public",table:"projects",filter:`org_id=eq.${CONFIG.org}`},
        ()=>loadProjects())
      .on("postgres_changes",{event:"INSERT",schema:"public",table:"updates"},
        async payload=>{
          if (detailProjectId && payload.new.project_id===detailProjectId) {
            renderUpdates(await loadUpdates(detailProjectId));
          }
        })
      .subscribe((status, err) => {
        if (err) console.error("Realtime subscribe error:", err);
      });
  } catch(e) {
    console.error("Realtime setup failed:", e);
  }
}

// ── FILTER ─────────────────────────────
function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll(".ftab").forEach(t=>t.classList.toggle("active", t.dataset.f===f));
  renderGrid();
}

// ── MODAL HELPERS ──────────────────────
function openNewModal() { openSm("modal-new"); }
function openSm(id)     { document.getElementById(id).classList.add("open"); }
function closeSm(id)    { document.getElementById(id).classList.remove("open"); }
document.querySelectorAll(".sm-overlay").forEach(el=>
  el.addEventListener("click",e=>{ if(e.target===el) el.classList.remove("open"); }));

// ── VIEW ───────────────────────────────
function showView(name) {
  document.querySelectorAll(".view").forEach(v=>v.classList.remove("active"));
  const el = document.getElementById("view-" + name);
  if (el) el.classList.add("active");
}

// ── TOAST ──────────────────────────────
let _tt;
function showToast(msg, type="") {
  const t=document.getElementById("toast");
  t.textContent=msg; t.className=`show ${type}`;
  clearTimeout(_tt); _tt=setTimeout(()=>t.className="",3200);
}

// ── UTILS ──────────────────────────────
function escHtml(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
function fmtDate(d){return new Date(d+(d.includes("T")?"":"T12:00:00")).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})}
function fmtTime(iso){const d=new Date(iso);return d.toLocaleDateString("en-US",{month:"short",day:"numeric"})+" · "+d.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"})}
</script>
